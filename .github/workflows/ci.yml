name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # :core has an Android target, so the SDK is needed even for server/web builds.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - uses: gradle/actions/setup-gradle@v4

      - name: Formatting & static analysis (ktlint + detekt)
        run: ./gradlew ktlintCheck detekt

      - name: Android Lint
        run: ./gradlew :app:androidApp:lintDevDebug

      - name: Unit tests (all modules)
        run: ./gradlew testDebugUnitTest :app:androidApp:testDevDebugUnitTest :core:jvmTest

      - name: Build backend fat jar
        run: ./gradlew :server:buildFatJar

      - name: Build Android debug APK
        run: ./gradlew :app:androidApp:assembleDevDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-dev-debug
          path: app/androidApp/build/outputs/apk/dev/debug/androidApp-dev-debug.apk
          if-no-files-found: error

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR commit messages (Conventional Commits)
        uses: wagoid/commitlint-github-action@v6
