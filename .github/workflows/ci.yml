name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # :core has an Android target, so the SDK is needed even for server/web builds.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - uses: gradle/actions/setup-gradle@v4

      - name: Test shared module
        run: ./gradlew :core:jvmTest --no-configuration-cache

      - name: Build backend fat jar
        run: ./gradlew :server:buildFatJar --no-configuration-cache

      - name: Build Android debug APK
        run: ./gradlew :app:androidApp:assembleDebug --no-configuration-cache

      - name: Build web distribution
        run: ./gradlew :app:webApp:jsBrowserDistribution --no-configuration-cache
