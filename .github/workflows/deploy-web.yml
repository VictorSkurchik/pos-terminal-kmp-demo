name: Deploy web admin (Vercel)

# Builds the Compose/JS admin console and deploys the static output to Vercel.
# Required repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
    paths:
      - 'app/webApp/**'
      - 'core/**'
      - '*.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # :core has an Android target, so the SDK is needed to configure the web build.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build web distribution
        run: ./gradlew :app:webApp:jsBrowserDistribution --no-configuration-cache

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          DIST=app/webApp/build/dist/js/productionExecutable
          # Mark the folder as prebuilt static output — no build/install on Vercel.
          printf '{"framework":null,"buildCommand":null,"installCommand":null}\n' > "$DIST/vercel.json"
          vercel deploy "$DIST" --prod --yes --token "$VERCEL_TOKEN"
