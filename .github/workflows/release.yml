name: Release APK

# Tag a commit `vX.Y.Z` (or run manually) to build the signed release APK and attach it
# to a GitHub Release. Signing uses a keystore materialised from repository secrets; without
# them the build falls back to the debug key (see app/androidApp/build.gradle.kts).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - uses: gradle/actions/setup-gradle@v4

      - name: Materialise release keystore (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK (prod flavor)
        run: ./gradlew :app:androidApp:assembleProdRelease

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: app/androidApp/build/outputs/apk/prod/release/androidApp-prod-release.apk
          generate_release_notes: true
