name: Release APK

# Tag a commit `vX.Y.Z` (or run manually) to build the APK and attach it to a GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: ./gradlew :app:androidApp:assembleDebug --no-configuration-cache

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: app/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          generate_release_notes: true
